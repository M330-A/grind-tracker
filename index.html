<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Grind Tracker</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.4/dist/umd/supabase.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #0d0d0f; color: #f0ede8; min-height: 100vh; }
    #app { max-width: 440px; margin: 0 auto; display: flex; flex-direction: column; min-height: 100vh; }
    #header { padding: 14px 14px 10px; border-bottom: 1px solid rgba(255,255,255,0.06); background: rgba(15,15,22,0.98); }
    #header-top { display: flex; justify-content: space-between; align-items: center; }
    #logo-sub { font-size: 8px; letter-spacing: 4px; color: #444; font-weight: 700; }
    #logo { font-size: 20px; font-weight: 900; color: #f0ede8; letter-spacing: 1px; line-height: 1.1; }
    #stats { display: flex; gap: 7px; }
    .stat-box { background: rgba(255,255,255,0.04); border-radius: 8px; padding: 5px 9px; text-align: center; border: 1px solid rgba(255,255,255,0.06); }
    .stat-label { color: #444; font-size: 8px; letter-spacing: 1px; font-weight: 700; }
    .stat-val { font-size: 15px; font-weight: 900; line-height: 1.2; }
    #progress-wrap { margin-top: 10px; }
    #progress-row { display: flex; justify-content: space-between; margin-bottom: 4px; }
    #progress-label { font-size: 9px; color: #555; letter-spacing: 1px; font-weight: 700; }
    #progress-count { font-size: 9px; font-weight: 700; }
    #progress-bar { height: 4px; background: rgba(255,255,255,0.07); border-radius: 4px; overflow: hidden; }
    #progress-fill { height: 100%; border-radius: 4px; width: 0%; transition: width 0.4s; }
    #tabs { display: flex; gap: 2px; padding: 8px 10px 0; background: #0d0d0f; }
    .tab-btn { flex: 1; padding: 7px 2px; border-radius: 8px; border: none; cursor: pointer; font-size: 10px; font-weight: 800; letter-spacing: 0.3px; transition: all 0.2s; }
    #content { flex: 1; overflow-y: auto; padding: 10px 10px 80px; }
    .view { display: none; }
    .view.active { display: block; }
    .day-badge { border-radius: 10px; padding: 10px 12px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.04); }
    .day-letter { font-size: 10px; font-weight: 800; letter-spacing: 2px; }
    .day-name { font-size: 15px; font-weight: 900; color: #f0ede8; }
    .day-target { color: #555; font-size: 10px; margin-top: 2px; }
    .section-label { font-size: 9px; letter-spacing: 2px; margin-bottom: 6px; font-weight: 700; }
    .ex-card { border-radius: 10px; padding: 11px 12px; margin-bottom: 8px; border: 1px solid rgba(255,255,255,0.07); border-left: 3px solid rgba(255,255,255,0.15); transition: all 0.25s; background: rgba(255,255,255,0.03); }
    .ex-card.done { background: rgba(126,200,126,0.06); border-color: rgba(126,200,126,0.3); border-left-color: #7ec87e; opacity: 0.75; }
    .ex-card.random { border-left-color: #a78bfa; }
    .ex-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .ex-name { font-size: 13px; font-weight: 700; color: #f0ede8; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
    .ex-name.done { color: #7ec87e; text-decoration: line-through; }
    .random-tag { background: rgba(167,139,250,0.15); color: #a78bfa; border: 1px solid rgba(167,139,250,0.3); border-radius: 4px; padding: 1px 5px; font-size: 9px; font-weight: 800; margin-left: 6px; flex-shrink: 0; }
    .check-btn { width: 28px; height: 28px; border-radius: 7px; flex-shrink: 0; font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; margin-left: 8px; }
    .effort-warning { font-size: 9px; color: #e05c5c; margin-bottom: 6px; font-weight: 700; letter-spacing: 1px; }
    .weight-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
    .w-btn { border-radius: 7px; width: 36px; height: 30px; cursor: pointer; font-size: 12px; font-weight: 900; flex-shrink: 0; border: none; }
    .w-display { flex: 1; text-align: center; background: rgba(245,200,66,0.08); border-radius: 7px; padding: 5px 0; border: 1px solid rgba(245,200,66,0.2); }
    .w-num { color: #f5c842; font-weight: 900; font-size: 14px; }
    .w-unit { color: #888; font-size: 10px; margin-left: 3px; }
    .sets-row { display: flex; gap: 5px; margin-bottom: 8px; }
    .set-col { flex: 1; }
    .set-label { color: #555; font-size: 9px; margin-bottom: 3px; text-align: center; font-weight: 700; }
    .set-select { width: 100%; background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.12); border-radius: 7px; color: #fff; padding: 6px 2px; text-align: center; font-size: 12px; outline: none; cursor: pointer; }
    .effort-row { display: flex; gap: 5px; margin-bottom: 7px; }
    .effort-btn { flex: 1; padding: 5px 0; border-radius: 7px; border: 1px solid rgba(255,255,255,0.08); background: rgba(255,255,255,0.03); font-size: 10px; font-weight: 800; cursor: pointer; transition: all 0.15s; }
    .action-row { display: flex; gap: 5px; }
    .tutorial-btn { flex: 1; padding: 5px 0; border-radius: 7px; border: 1px solid rgba(255,80,80,0.25); background: rgba(255,80,80,0.07); color: #ff6b6b; font-size: 10px; font-weight: 700; text-align: center; text-decoration: none; display: block; }
    .swap-btn { flex: 1; padding: 5px 0; border-radius: 7px; border: 1px solid rgba(167,139,250,0.25); background: rgba(167,139,250,0.07); color: #a78bfa; font-size: 10px; font-weight: 700; cursor: pointer; }
    .swap-panel { margin-top: 8px; background: rgba(0,0,0,0.4); border-radius: 8px; padding: 8px; display: none; }
    .swap-panel.open { display: block; }
    .swap-label { color: #555; font-size: 9px; margin-bottom: 6px; letter-spacing: 2px; font-weight: 700; }
    .swap-opt { display: block; width: 100%; text-align: left; padding: 7px 8px; margin-bottom: 4px; background: rgba(167,139,250,0.07); border: 1px solid rgba(167,139,250,0.15); border-radius: 6px; color: #c4b5fd; font-size: 11px; cursor: pointer; }
    #finish-btn { width: 100%; padding: 13px 0; margin-top: 10px; border-radius: 10px; border: none; font-size: 13px; font-weight: 900; letter-spacing: 2px; cursor: pointer; transition: all 0.3s; }
    .hist-item { background: rgba(255,255,255,0.03); border-radius: 10px; padding: 10px 12px; margin-bottom: 7px; }
    .hist-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
    .hist-title { font-size: 12px; font-weight: 800; }
    .hist-date { color: #444; font-size: 10px; }
    .hist-ex { display: flex; justify-content: space-between; align-items: center; padding: 3px 0; border-bottom: 1px solid rgba(255,255,255,0.04); }
    .hist-ex-name { color: #888; font-size: 11px; }
    .hist-ex-right { display: flex; gap: 6px; align-items: center; }
    .effort-tag { border-radius: 4px; padding: 1px 5px; font-size: 8px; font-weight: 800; }
    .hist-weight { color: #555; font-size: 11px; font-weight: 700; }
    .prog-card { background: rgba(255,255,255,0.03); border-radius: 10px; padding: 11px 13px; margin-bottom: 8px; border: 1px solid rgba(255,255,255,0.06); }
    .prog-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
    .prog-name { font-size: 12px; font-weight: 800; color: #f0ede8; margin-bottom: 2px; }
    .prog-sessions { font-size: 10px; color: #555; }
    .prog-weight { font-size: 16px; font-weight: 900; color: #f5c842; }
    .prog-gained { font-size: 10px; font-weight: 700; }
    .prog-bars { display: flex; align-items: flex-end; gap: 3px; height: 44px; margin-bottom: 4px; }
    .prog-bar-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 2px; }
    .prog-bar { width: 100%; border-radius: 3px 3px 0 0; }
    .prog-bar-val { color: #444; font-size: 8px; }
    .prog-footer { display: flex; justify-content: space-between; }
    .prog-start { color: #444; font-size: 9px; }
    .prog-now { color: #f5c842; font-size: 9px; font-weight: 700; }
    .filter-row { display: flex; gap: 5px; margin-bottom: 12px; overflow-x: auto; padding-bottom: 2px; }
    .filter-btn { flex-shrink: 0; padding: 5px 10px; border-radius: 20px; border: 1px solid; font-size: 10px; font-weight: 700; cursor: pointer; }
    .bw-card { background: rgba(255,255,255,0.03); border-radius: 10px; padding: 11px 13px; margin-bottom: 8px; border: 1px solid rgba(255,255,255,0.06); border-left: 3px solid #a78bfa; }
    .bw-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
    .bw-title { font-size: 12px; font-weight: 800; color: #f0ede8; margin-bottom: 2px; }
    .bw-entries { font-size: 10px; color: #555; }
    .bw-latest { font-size: 16px; font-weight: 900; color: #a78bfa; }
    .bw-diff { font-size: 10px; font-weight: 700; }
    .bw-log { border-top: 1px solid rgba(255,255,255,0.05); padding-top: 8px; margin-top: 6px; }
    .bw-row { display: flex; justify-content: space-between; padding: 3px 0; }
    .bw-date { color: #555; font-size: 11px; }
    .bw-val { color: #a78bfa; font-weight: 700; font-size: 11px; }
    .profile-card { background: rgba(255,255,255,0.03); border-radius: 10px; padding: 13px; margin-bottom: 14px; border: 1px solid rgba(255,255,255,0.06); }
    .profile-row { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
    .profile-label { color: #555; font-size: 11px; }
    .profile-val { color: #f0ede8; font-size: 11px; font-weight: 700; }
    .sec-title { font-size: 10px; font-weight: 900; color: #555; letter-spacing: 2px; margin-bottom: 10px; text-transform: uppercase; }
    .bw-input-row { display: flex; gap: 7px; margin-bottom: 12px; }
    .bw-input { flex: 1; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); border-radius: 9px; color: #fff; padding: 9px 12px; font-size: 13px; outline: none; }
    .bw-log-btn { background: linear-gradient(90deg,#f5c842,#e8a020); border: none; border-radius: 9px; padding: 9px 16px; color: #0d0d0f; font-weight: 800; font-size: 12px; cursor: pointer; }
    .empty { text-align: center; color: #444; padding: 30px 16px; font-size: 12px; }
    .loading { text-align: center; color: #555; padding: 30px; font-size: 12px; }
  </style>
</head>
<body>
<div id="app">
  <div id="header">
    <div id="header-top">
      <div>
        <div id="logo-sub">YOUR IRON LOG</div>
        <div id="logo">GRIND TRACKER</div>
      </div>
      <div id="stats">
        <div class="stat-box">
          <div class="stat-label">STREAK</div>
          <div class="stat-val" id="streak-val" style="color:#f5c842">0x</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">TOTAL</div>
          <div class="stat-val" id="total-val" style="color:#a78bfa">0</div>
        </div>
      </div>
    </div>
    <div id="progress-wrap">
      <div id="progress-row">
        <span id="progress-label">TODAY</span>
        <span id="progress-count" style="color:#e05c5c">0/0 done</span>
      </div>
      <div id="progress-bar"><div id="progress-fill" style="background:linear-gradient(90deg,#e05c5c,#f5c842)"></div></div>
    </div>
  </div>

  <div id="tabs"></div>

  <div id="content">
    <div id="view-today" class="view active">
      <div class="loading">Loading workout...</div>
    </div>
    <div id="view-history" class="view">
      <div class="loading">Loading...</div>
    </div>
    <div id="view-progress" class="view">
      <div class="loading">Loading...</div>
    </div>
    <div id="view-profile" class="view">
      <div class="loading">Loading...</div>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://jykdtigxiejzqwmihoto.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp5a2R0aWd4aWVqenF3bWlob3RvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEyMTM3NjgsImV4cCI6MjA5Njc4OTc2OH0.IMvPPpBugBkzRVlndpIC2ylYQKLelr0royPufLRPaSc';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

function getDeviceId() {
  let id = localStorage.getItem('grind_device_id');
  if (!id) { id = 'user_' + Math.random().toString(36).slice(2) + Date.now().toString(36); localStorage.setItem('grind_device_id', id); }
  return id;
}
const DEVICE_ID = getDeviceId();

const YOUTUBE = {
  'Bench Press':'https://www.youtube.com/watch?v=SCVCLChPQFY','Dumbbell Flyes':'https://www.youtube.com/watch?v=eozdVDA78K0',
  'Incline Dumbbell Press':'https://www.youtube.com/watch?v=8iPEnn-ltC8','Tricep Kickbacks':'https://www.youtube.com/watch?v=6SS6K3lAwZ8',
  'Overhead Tricep Extension':'https://www.youtube.com/watch?v=YbX7Wd8jQ-Q','Tricep Dumbbell Press':'https://www.youtube.com/watch?v=2z8JmcrW-As',
  'Curl Bar Curls':'https://www.youtube.com/watch?v=kwG2ipFRgfo','Dumbbell Rows':'https://www.youtube.com/watch?v=roCP6wCXPqo',
  'Hammer Curls':'https://www.youtube.com/watch?v=zC3nLlEvin4','Concentration Curls':'https://www.youtube.com/watch?v=Jvj2wV0vOFU',
  'Dumbbell Shrugs':'https://www.youtube.com/watch?v=g6qbq4Lf1FI','Dumbbell Deadlift':'https://www.youtube.com/watch?v=ytGaGIn3SjE',
  'Dumbbell Shoulder Press':'https://www.youtube.com/watch?v=qEwKCR5JCog','Lateral Raises':'https://www.youtube.com/watch?v=3VcKaXpzqRo',
  'Arnold Press':'https://www.youtube.com/watch?v=6Z15_WdXmVw','Dumbbell Step-Ups':'https://www.youtube.com/watch?v=aajhW7DD1EA',
  'Goblet Squats':'https://www.youtube.com/watch?v=MeIiIdhvXT4','Dumbbell Lunges':'https://www.youtube.com/watch?v=D7KaRcUTQeE',
  'Front Raises':'https://www.youtube.com/watch?v=sOF0vpX2qEo'
};

const DAYS = {
  A:{ label:'Chest + Triceps', color:'#e05c5c', staples:['Bench Press','Dumbbell Flyes','Incline Dumbbell Press'], pool:['Tricep Kickbacks','Overhead Tricep Extension','Tricep Dumbbell Press'] },
  B:{ label:'Back + Biceps', color:'#5c9ee0', staples:['Curl Bar Curls','Dumbbell Rows','Hammer Curls'], pool:['Concentration Curls','Dumbbell Shrugs','Dumbbell Deadlift'] },
  C:{ label:'Shoulders + Legs', color:'#7ec87e', staples:['Dumbbell Shoulder Press','Lateral Raises','Arnold Press'], pool:['Dumbbell Step-Ups','Goblet Squats','Dumbbell Lunges','Front Raises'] }
};

const DEFAULT_WEIGHTS = {
  'Bench Press':45,'Dumbbell Flyes':15,'Incline Dumbbell Press':20,'Tricep Kickbacks':10,
  'Overhead Tricep Extension':15,'Tricep Dumbbell Press':15,'Curl Bar Curls':20,'Dumbbell Rows':20,
  'Hammer Curls':15,'Concentration Curls':12,'Dumbbell Shrugs':25,'Dumbbell Deadlift':30,
  'Dumbbell Shoulder Press':20,'Lateral Raises':10,'Arnold Press':15,'Dumbbell Step-Ups':15,
  'Goblet Squats':20,'Dumbbell Lunges':15,'Front Raises':10
};

const EFFORT_COLORS = { Easy:'#7ec87e', Moderate:'#f5c842', Hard:'#e05c5c' };

let history = [], bodyWeights = [], workout = [], currentDay = 'A', rotators = [];
let exFilter = 'All', wtFilter = 'Weight', currentTab = 'today';

function pickRandom(arr, n) { return arr.slice().sort(()=>Math.random()-0.5).slice(0,n); }

function getNextDay(h) {
  const order = ['A','B','C'];
  if (!h.length) return 'A';
  return order[(order.indexOf(h[h.length-1].day)+1)%3];
}

function buildWorkout(day, h, rots) {
  const d = DAYS[day];
  const r = rots || pickRandom(d.pool, 2);
  return [...d.staples, ...r].map(name => {
    let w = DEFAULT_WEIGHTS[name] || 10;
    for (let i = h.length-1; i >= 0; i--) {
      const ex = h[i].exercises.find(e => e.name === name);
      if (ex) { w = ex.effort === 'Easy' ? ex.weight+5 : ex.weight; break; }
    }
    return { name, weight: w, sets:[10,10,10], effort:null, done:false };
  });
}

function getStreak(h) {
  if (!h.length) return 0;
  let count = 1;
  for (let i = h.length-1; i > 0; i--) {
    const diff = (new Date(h[i].date) - new Date(h[i-1].date)) / 86400000;
    if (diff <= 3) count++; else break;
  }
  return count;
}

function updateHeader() {
  const dc = DAYS[currentDay].color;
  const done = workout.filter(e=>e.done).length;
  const total = workout.length;
  document.getElementById('streak-val').textContent = getStreak(history) + 'x';
  document.getElementById('total-val').textContent = history.length;
  document.getElementById('progress-count').textContent = done+'/'+total+' done';
  document.getElementById('progress-count').style.color = done===total && total>0 ? '#7ec87e' : dc;
  document.getElementById('progress-fill').style.width = (total ? done/total*100 : 0)+'%';
  document.getElementById('progress-fill').style.background = 'linear-gradient(90deg,'+dc+',#f5c842)';
  document.querySelectorAll('.tab-btn').forEach(b => {
    const active = b.dataset.tab === currentTab;
    b.style.background = active ? dc : 'rgba(255,255,255,0.04)';
    b.style.color = active ? '#0d0d0f' : '#555';
  });
}

function renderTabs() {
  const tabs = [['today','Today'],['history','History'],['progress','Progress'],['profile','Profile']];
  document.getElementById('tabs').innerHTML = tabs.map(([id,label])=>
    '<button class="tab-btn" data-tab="'+id+'" onclick="switchTab(\''+id+'\')" style="background:rgba(255,255,255,0.04);color:#555">'+label.toUpperCase()+'</button>'
  ).join('');
}

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.getElementById('view-'+tab).classList.add('active');
  updateHeader();
  if (tab==='today') renderToday();
  if (tab==='history') renderHistory();
  if (tab==='progress') renderProgress();
  if (tab==='profile') renderProfile();
}

function renderToday() {
  const dc = DAYS[currentDay].color;
  const sc = DAYS[currentDay].staples.length;
  const done = workout.filter(e=>e.done).length;
  const total = workout.length;
  const allDone = done===total && total>0;

  let html = '<div class="day-badge" style="border-color:'+dc+'44">';
  html += '<div><div class="day-letter" style="color:'+dc+'">DAY '+currentDay+'</div>';
  html += '<div class="day-name">'+DAYS[currentDay].label+'</div>';
  html += '<div class="day-target">3 sets / 8-10 reps</div></div></div>';

  html += '<div class="section-label" style="color:#555">STAPLES</div>';
  workout.slice(0,sc).forEach((ex,i) => { html += renderExCard(ex, i, false); });

  html += '<div class="section-label" style="color:#a78bfa;margin-top:10px">RANDOM PICKS</div>';
  workout.slice(sc).forEach((ex,i) => { html += renderExCard(ex, sc+i, true); });

  const btnBg = done>0&&allDone ? 'linear-gradient(90deg,'+dc+',#f5c842)' : 'rgba(255,255,255,0.05)';
  const btnColor = allDone ? '#0d0d0f' : '#333';
  const btnText = allDone ? 'FINISH WORKOUT' : 'CHECK OFF ALL EXERCISES ('+done+'/'+total+')';
  html += '<button id="finish-btn" onclick="finishWorkout()" style="background:'+btnBg+';color:'+btnColor+';cursor:'+(allDone?'pointer':'default')+'">'+btnText+'</button>';

  document.getElementById('view-today').innerHTML = html;
}

function renderExCard(ex, idx, isRotator) {
  const ready = ex.effort !== null;
  const dc = DAYS[currentDay].color;
  let html = '<div class="ex-card'+(ex.done?' done':'')+(isRotator&&!ex.done?' random':'')+'" id="excard-'+idx+'">';
  html += '<div class="ex-top">';
  html += '<div style="display:flex;align-items:center;flex:1;min-width:0">';
  html += '<span class="ex-name'+(ex.done?' done':'')+'">'+ex.name+'</span>';
  if (isRotator) html += '<span class="random-tag">RANDOM</span>';
  html += '</div>';
  const checkStyle = 'border:1px solid '+(ex.done?'#7ec87e':ready?'rgba(255,255,255,0.3)':'rgba(255,255,255,0.1)')+';background:'+(ex.done?'#7ec87e':ready?'rgba(255,255,255,0.08)':'rgba(255,255,255,0.03)')+';color:'+(ex.done?'#0d0d0f':ready?'#aaa':'#333')+';cursor:'+(ready?'pointer':'not-allowed');
  html += '<button class="check-btn" style="'+checkStyle+'" onclick="toggleDone('+idx+')">'+(ex.done?'V':'o')+'</button>';
  html += '</div>';
  if (!ready && !ex.done) html += '<div class="effort-warning">SET EFFORT TO MARK DONE</div>';

  html += '<div class="weight-row">';
  html += '<button class="w-btn" style="background:rgba(224,92,92,0.15);border:1px solid rgba(224,92,92,0.3);color:#e05c5c" onclick="changeWeight('+idx+',-5)">-5</button>';
  html += '<div class="w-display"><span class="w-num">'+ex.weight+'</span><span class="w-unit">lbs</span></div>';
  html += '<button class="w-btn" style="background:rgba(126,200,126,0.15);border:1px solid rgba(126,200,126,0.3);color:#7ec87e" onclick="changeWeight('+idx+',5)">+5</button>';
  html += '</div>';

  html += '<div class="sets-row">';
  ex.sets.forEach((r,i) => {
    html += '<div class="set-col"><div class="set-label">SET '+(i+1)+'</div>';
    html += '<select class="set-select" onchange="changeReps('+idx+','+i+',this.value)">';
    [8,9,10].forEach(v => { html += '<option value="'+v+'"'+(r===v?' selected':'')+' style="background:#1a1a2e">'+v+' reps</option>'; });
    html += '</select></div>';
  });
  html += '</div>';

  html += '<div class="effort-row">';
  ['Easy','Moderate','Hard'].forEach(level => {
    const color = EFFORT_COLORS[level];
    const sel = ex.effort === level;
    html += '<button class="effort-btn" style="border-color:'+(sel?color:'rgba(255,255,255,0.08)')+';background:'+(sel?color+'33':'rgba(255,255,255,0.03)')+';color:'+(sel?color:'#444')+'" onclick="setEffort('+idx+',\''+level+'\')">'+level+'</button>';
  });
  html += '</div>';

  html += '<div class="action-row">';
  if (YOUTUBE[ex.name]) html += '<a class="tutorial-btn" href="'+YOUTUBE[ex.name]+'" target="_blank">TUTORIAL</a>';
  if (isRotator) html += '<button class="swap-btn" onclick="toggleSwap('+idx+')">SWAP</button>';
  html += '</div>';

  if (isRotator) {
    const sc = DAYS[currentDay].staples.length;
    const rotIdx = idx - sc;
    html += '<div class="swap-panel" id="swap-'+idx+'"><div class="swap-label">PICK REPLACEMENT</div>';
    DAYS[currentDay].pool.filter(p=>p!==ex.name).forEach(opt => {
      html += '<button class="swap-opt" onclick="doSwap('+rotIdx+',\''+opt.replace(/'/g,"\\'")+'\')">' + opt + '</button>';
    });
    html += '</div>';
  }

  html += '</div>';
  return html;
}

function toggleDone(idx) {
  if (!workout[idx].effort) return;
  workout[idx].done = !workout[idx].done;
  renderToday(); updateHeader();
}

function changeWeight(idx, delta) {
  workout[idx].weight = Math.max(5, workout[idx].weight + delta);
  workout[idx].done = false;
  renderToday(); updateHeader();
}

function changeReps(idx, setIdx, val) {
  workout[idx].sets[setIdx] = Number(val);
  workout[idx].done = false;
}

function setEffort(idx, level) {
  workout[idx].effort = workout[idx].effort === level ? null : level;
  workout[idx].done = false;
  renderToday(); updateHeader();
}

function toggleSwap(idx) {
  const panel = document.getElementById('swap-'+idx);
  if (panel) panel.classList.toggle('open');
}

function doSwap(rotIdx, newName) {
  rotators[rotIdx] = newName;
  const sc = DAYS[currentDay].staples.length;
  let w = DEFAULT_WEIGHTS[newName] || 10;
  for (let i = history.length-1; i >= 0; i--) {
    const ex = history[i].exercises.find(e=>e.name===newName);
    if (ex) { w = ex.effort==='Easy' ? ex.weight+5 : ex.weight; break; }
  }
  workout[sc+rotIdx] = { name:newName, weight:w, sets:[10,10,10], effort:null, done:false };
  renderToday(); updateHeader();
}

async function finishWorkout() {
  const done = workout.filter(e=>e.done).length;
  if (done !== workout.length) return;
  const entry = {
    date: new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}),
    day: currentDay, label: DAYS[currentDay].label, exercises: workout
  };
  await sb.from('workout_history').insert({ device_id:DEVICE_ID, session_data:entry });
  history.push(entry);
  document.getElementById('finish-btn').textContent = 'SAVED! NICE WORK';
  document.getElementById('finish-btn').style.background = 'linear-gradient(90deg,#4caf50,#27ae60)';
  document.getElementById('finish-btn').style.color = '#fff';
  setTimeout(() => {
    const nextDay = getNextDay(history);
    currentDay = nextDay;
    rotators = pickRandom(DAYS[nextDay].pool, 2);
    workout = buildWorkout(nextDay, history, rotators);
    renderToday(); updateHeader();
  }, 2000);
}

function renderHistory() {
  if (!history.length) { document.getElementById('view-history').innerHTML = '<div class="empty">No workouts yet. Get after it!</div>'; return; }
  let html = '<div class="sec-title">HISTORY - '+history.length+' SESSIONS</div>';
  const reversed = history.slice().reverse();
  reversed.forEach((session, revIdx) => {
    const realIdx = history.length - 1 - revIdx;
    const dc = DAYS[session.day].color;
    html += '<div class="hist-item" style="border-left:3px solid '+dc+'">';
    html += '<div class="hist-header"><span class="hist-title" style="color:'+dc+'">Day '+session.day+' - '+session.label+'</span><div style="display:flex;align-items:center;gap:8px"><span class="hist-date">'+session.date+'</span><button onclick="deleteSession('+realIdx+')" style="background:rgba(224,92,92,0.1);border:1px solid rgba(224,92,92,0.3);color:#e05c5c;border-radius:6px;padding:2px 8px;font-size:10px;cursor:pointer;font-weight:700">DEL</button></div></div>';
    session.exercises.forEach(ex => {
      const ec = ex.effort ? EFFORT_COLORS[ex.effort] : '#444';
      html += '<div class="hist-ex"><span class="hist-ex-name">'+ex.name+'</span><div class="hist-ex-right">';
      if (ex.effort) html += '<span class="effort-tag" style="background:'+ec+'22;color:'+ec+';border:1px solid '+ec+'44">'+ex.effort.toUpperCase()+'</span>';
      html += '<span class="hist-weight">'+ex.weight+'lbs</span></div></div>';
    });
    html += '</div>';
  });
  document.getElementById('view-history').innerHTML = html;
}

function getProgress(name) {
  return history.flatMap(s=>s.exercises.filter(e=>e.name===name).map(e=>({date:s.date,weight:e.weight}))).slice(-10);
}

function getExColor(name) {
  if ([...DAYS.A.staples,...DAYS.A.pool].includes(name)) return DAYS.A.color;
  if ([...DAYS.B.staples,...DAYS.B.pool].includes(name)) return DAYS.B.color;
  return DAYS.C.color;
}

function renderProgress() {
  const dc = DAYS[currentDay].color;
  let html = '<div class="sec-title">PROGRESS</div>';
  html += '<div style="display:flex;gap:5px;margin-bottom:12px">';
  ['Weight','Exercises'].forEach(f => {
    const active = wtFilter===f;
    html += '<button class="filter-btn" style="flex:1;border-color:'+(active?'#f5c842':'rgba(255,255,255,0.1)')+';background:'+(active?'rgba(245,200,66,0.12)':'rgba(255,255,255,0.04)')+';color:'+(active?'#f5c842':'#555')+'" onclick="setWtFilter(\''+f+'\')">'+(f==='Weight'?'BODY WEIGHT':'LIFTS')+'</button>';
  });
  html += '</div>';

  if (wtFilter==='Weight') {
    if (!bodyWeights.length) { html += '<div class="empty">No body weight entries yet. Log one in Profile.</div>'; }
    else {
      const latest = bodyWeights[bodyWeights.length-1].weight;
      const diff = bodyWeights.length>1 ? latest-bodyWeights[0].weight : 0;
      const vals = bodyWeights.slice(-12).map(d=>d.weight);
      const mx = Math.max(...vals), mn = Math.min(...vals);
      html += '<div class="bw-card"><div class="bw-top"><div><div class="bw-title">Body Weight</div><div class="bw-entries">'+bodyWeights.length+' entries</div></div>';
      html += '<div><div class="bw-latest">'+latest+' <span style="font-size:10px;color:#555">lbs</span></div>';
      if (diff!==0) html += '<div class="bw-diff" style="color:'+(diff<=0?'#7ec87e':'#e05c5c')+'">'+(diff>0?'+':'')+diff+' lbs</div>';
      html += '</div></div>';
      html += '<div class="prog-bars">';
      bodyWeights.slice(-12).forEach((d,i,arr)=>{
        const h2 = mx===mn?44:((d.weight-mn)/(mx-mn))*36+8;
        const isLast = i===arr.length-1;
        html += '<div class="prog-bar-col"><div class="prog-bar" style="height:'+h2+'px;background:'+(isLast?'#a78bfa':'#2a2a3a')+';opacity:'+(0.4+(i/arr.length)*0.6)+'"></div><div class="prog-bar-val">'+d.weight+'</div></div>';
      });
      html += '</div>';
      html += '<div class="bw-log">';
      bodyWeights.slice().reverse().slice(0,6).forEach(bw => {
        html += '<div class="bw-row"><span class="bw-date">'+bw.date+'</span><span class="bw-val">'+bw.weight+' lbs</span></div>';
      });
      html += '</div></div>';
    }
  } else {
    const groups = { 'All':[...new Set(['A','B','C'].flatMap(d=>[...DAYS[d].staples,...DAYS[d].pool]))], 'Chest+Tris':[...DAYS.A.staples,...DAYS.A.pool], 'Back+Bis':[...DAYS.B.staples,...DAYS.B.pool], 'Shoulders':[...DAYS.C.staples,...DAYS.C.pool] };
    html += '<div class="filter-row">';
    Object.keys(groups).forEach(g => {
      const active = exFilter===g;
      html += '<button class="filter-btn" style="border-color:'+(active?dc:'rgba(255,255,255,0.1)')+';background:'+(active?dc+'22':'rgba(255,255,255,0.04)')+';color:'+(active?dc:'#555')+'" onclick="setExFilter(\''+g+'\')">'+g+'</button>';
    });
    html += '</div>';
    if (!history.length) { html += '<div class="empty">Log workouts to see lift progress!</div>'; }
    else {
      (groups[exFilter]||groups['All']).forEach(name => {
        const data = getProgress(name);
        if (!data.length) return;
        const color = getExColor(name);
        const latest = data[data.length-1].weight, first = data[0].weight, gained = latest-first;
        const vals = data.map(d=>d.weight), mx2 = Math.max(...vals), mn2 = Math.min(...vals);
        html += '<div class="prog-card" style="border-left:3px solid '+color+'">';
        html += '<div class="prog-top"><div><div class="prog-name">'+name+'</div><div class="prog-sessions">'+data.length+' sessions</div></div>';
        html += '<div><div class="prog-weight">'+latest+' <span style="font-size:10px;color:#555">lbs</span></div>';
        if (gained!==0) html += '<div class="prog-gained" style="color:'+(gained>0?'#7ec87e':'#e05c5c')+'">'+(gained>0?'+':'')+gained+' lbs</div>';
        html += '</div></div><div class="prog-bars">';
        data.forEach((d,i)=>{
          const h3 = mx2===mn2?44:((d.weight-mn2)/(mx2-mn2))*36+8;
          const isLast = i===data.length-1;
          html += '<div class="prog-bar-col"><div class="prog-bar" style="height:'+h3+'px;background:'+(isLast?color:'#2a2a3a')+';opacity:'+(0.4+(i/data.length)*0.6)+'"></div><div class="prog-bar-val">'+d.weight+'</div></div>';
        });
        html += '</div><div class="prog-footer"><span class="prog-start">Start: '+first+' lbs</span><span class="prog-now">Now: '+latest+' lbs</span></div></div>';
      });
    }
  }
  document.getElementById('view-progress').innerHTML = html;
}

function setWtFilter(f) { wtFilter=f; renderProgress(); }
function setExFilter(f) { exFilter=f; renderProgress(); }

function renderProfile() {
  const lastBW = bodyWeights.length ? bodyWeights[bodyWeights.length-1].weight+' lbs' : '--';
  let html = '<div class="sec-title">PROFILE</div>';
  html += '<div class="profile-card">';
  [['Age','35'],['Height',"5'8\""],['Goal','Muscle + Strength'],['Schedule','3x / week'],['Total Sessions',history.length],['Streak',getStreak(history)+' sessions'],['Last Weight',lastBW]].forEach(row=>{
    html += '<div class="profile-row"><span class="profile-label">'+row[0]+'</span><span class="profile-val">'+row[1]+'</span></div>';
  });
  html += '</div>';
  html += '<div class="sec-title">LOG BODY WEIGHT</div>';
  html += '<div class="bw-input-row"><input class="bw-input" type="number" id="bw-input" placeholder="lbs today"/><button class="bw-log-btn" onclick="logBW()">LOG</button></div>';
  if (bodyWeights.length) {
    html += '<div class="profile-card"><div class="sec-title" style="margin-bottom:8px">WEIGHT LOG</div>';
    bodyWeights.slice().reverse().slice(0,10).forEach(bw=>{
      html += '<div class="bw-row"><span class="bw-date">'+bw.date+'</span><span class="bw-val">'+bw.weight+' lbs</span></div>';
    });
    html += '</div>';
  }
  document.getElementById('view-profile').innerHTML = html;
}

async function logBW() {
  const input = document.getElementById('bw-input');
  if (!input || !input.value) return;
  const date = new Date().toLocaleDateString('en-US',{month:'short',day:'numeric'});
  const weight = Number(input.value);
  await sb.from('body_weights').insert({ device_id:DEVICE_ID, date, weight });
  bodyWeights.push({ date, weight });
  renderProfile();
}

async function deleteSession(idx) {
  if (!confirm('Delete this workout?')) return;
  const session = history[idx];
  // find and delete from supabase by matching date and day
  const { data } = await sb.from('workout_history').select('id, session_data').eq('device_id', DEVICE_ID);
  if (data) {
    const match = data.find(r => r.session_data.date === session.date && r.session_data.day === session.day);
    if (match) await sb.from('workout_history').delete().eq('id', match.id);
  }
  history.splice(idx, 1);
  renderHistory();
  updateHeader();
}

async function init() {
  const [{ data: histData }, { data: bwData }] = await Promise.all([
    sb.from('workout_history').select('*').eq('device_id',DEVICE_ID).order('created_at',{ascending:true}),
    sb.from('body_weights').select('*').eq('device_id',DEVICE_ID).order('created_at',{ascending:true})
  ]);
  history = (histData||[]).map(r=>r.session_data);
  bodyWeights = (bwData||[]).map(r=>({date:r.date,weight:r.weight}));
  currentDay = getNextDay(history);
  rotators = pickRandom(DAYS[currentDay].pool, 2);
  workout = buildWorkout(currentDay, history, rotators);
  renderTabs();
  renderToday();
  updateHeader();
}

init();
</script>
</body>
</html>
